<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Catálogo VR Final - FNR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        #sidebar { display: none; }
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene background="color: #0f172a" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        
        <a-entity id="vr-menu-panel" position="-2.5 2 -4" rotation="0 20 0">
            <a-plane id="menu-bg" color="#1e293b" width="2" height="1.8" opacity="0.95" position="0 0.4 0"></a-plane>
            
            <a-text value="MENU DE COMIDAS" align="center" position="0 1.1 0.01" width="4" color="#3b82f6"></a-text>
            
            <a-plane class="clickable" position="0 0.7 0.02" width="1.7" height="0.25" color="#22c55e" onclick="handleCreate()">
                <a-text value="CRIAR ALEATORIO" align="center" width="3"></a-text>
            </a-plane>

            <a-plane class="clickable" position="0 0.35 0.02" width="1.7" height="0.25" color="#eab308" onclick="handleUpdate()">
                <a-text value="ATUALIZAR SELECIONADO" align="center" width="2.8"></a-text>
            </a-plane>

            <a-plane class="clickable" position="0 0 0.02" width="1.7" height="0.25" color="#ef4444" onclick="handleDelete()">
                <a-text value="DELETAR SELECIONADO" align="center" width="3"></a-text>
            </a-plane>

            <a-entity id="vr-list-container" position="0 -0.3 0.02">
                <a-text value="COMIDAS NO SISTEMA:" align="center" position="0 0 0" width="2.5" color="#94a3b8"></a-text>
                <a-entity id="vr-items-list" position="0 -0.15 0"></a-entity>
            </a-entity>
        </a-entity>

        <a-grid position="0 0 0" rotation="-90 0 0" width="100" height="100" material="opacity: 0.1; color: #3b82f6"></a-grid>
        <a-entity id="mainContainer" position="1 0 -5"></a-entity>

        <a-camera position="0 1.6 0">
            <a-cursor fuse="true" fuse-timeout="1200" color="#3b82f6" raycaster="objects: .clickable"
                      animation__fusing="property: scale; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1200; startEvents: fusing">
            </a-cursor>
        </a-camera>

        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
    </a-scene>

    <script>
        const DB_KEY = 'catalogo_comidas_vr_v2';
        let currentSelectedId = null;
        
        // Travas Anti-Flood
        let podeCriar = true; 
        let podeAtualizar = true;
        let podeDeletar = true;

        const comidas = ["Pizza", "Sushi", "Burger", "Taco", "Bruschetta", "Lasanha", "Salada", "Bife", "Frango", "Sorvete","Peixada","Spaguetti","Yakisoba","Feijoada"];
        const cores = ["#EF4444", "#3B82F6", "#22C55E", "#EAB308", "#A855F7", "#F97316", "#06B6D4", "#EC4899", "#84CC16", "#6366F1","#92400E","#065F46","#374151","#BE185D"];

        function getItems() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; }

        function saveItems(items) {
            localStorage.setItem(DB_KEY, JSON.stringify(items));
            renderScene();
        }

        function handleCreate() {
            if (!podeCriar) return;
            podeCriar = false;

            const items = getItems();
            
            // LÓGICA DE GRADE INTELIGENTE (Procura o primeiro slot livre)
            const slotsOcupados = items.map(i => i.slotIndex);
            let slotLivre = 0;
            while (slotsOcupados.includes(slotLivre)) {
                slotLivre++;
            }

            const gridX = (slotLivre % 5) * 1.3; 
            const gridZ = Math.floor(slotLivre / 5) * -1.6;

            const newItem = {
                id: Date.now(),
                slotIndex: slotLivre, // Guarda o índice para saber qual vaga está ocupando
                name: comidas[Math.floor(Math.random() * comidas.length)],
                color: cores[Math.floor(Math.random() * cores.length)],
                pos: { x: gridX, y: 0.5, z: gridZ }
            };

            items.push(newItem);
            saveItems(items);

            setTimeout(() => { podeCriar = true; }, 1500);
        }

        function handleDelete() {
            if(!currentSelectedId || !podeDeletar) return;
            
            podeDeletar = false;
            const items = getItems().filter(i => i.id !== currentSelectedId);
            currentSelectedId = null;
            saveItems(items);

            setTimeout(() => { podeDeletar = true; }, 1500);
        }

        function handleUpdate() {
            if(!currentSelectedId || !podeAtualizar) return;
            podeAtualizar = false;
            
            const items = getItems().map(i => {
                if(i.id === currentSelectedId) {
                    i.name = comidas[Math.floor(Math.random() * comidas.length)];
                    i.color = cores[Math.floor(Math.random() * cores.length)];
                }
                return i;
            });
            
            saveItems(items);
            setTimeout(() => { podeAtualizar = true; }, 1500);
        }

        function renderScene() {
            const container = document.querySelector('#mainContainer');
            const vrList = document.querySelector('#vr-items-list');
            const menuBg = document.querySelector('#menu-bg');
            
            container.innerHTML = '';
            vrList.innerHTML = '';
            
            const items = getItems();

            // Ajuste dinâmico do menu
            const novaAltura = 1.2 + (items.length * 0.18);
            menuBg.setAttribute('height', novaAltura);
            menuBg.setAttribute('position', `0 ${0.8 - (novaAltura/2)} 0`);

            items.forEach((item, index) => {
                const box = document.createElement('a-box');
                box.setAttribute('position', `${item.pos.x} ${item.pos.y} ${item.pos.z}`);
                box.setAttribute('color', item.color);
                box.setAttribute('class', 'clickable');
                
                const scale = (currentSelectedId === item.id) ? "0.8 0.8 0.8" : "0.5 0.5 0.5";
                box.setAttribute('scale', scale);
                
                const text = document.createElement('a-text');
                text.setAttribute('value', item.name);
                text.setAttribute('position', '0 0.8 0');
                text.setAttribute('align', 'center');
                text.setAttribute('width', '4');
                box.appendChild(text);

                box.addEventListener('click', () => {
                    currentSelectedId = item.id;
                    renderScene();
                });

                container.appendChild(box);

                const listItem = document.createElement('a-text');
                listItem.setAttribute('value', `- ${item.name}`);
                listItem.setAttribute('position', `0 ${-0.15 * index} 0`);
                listItem.setAttribute('align', 'center');
                listItem.setAttribute('width', '2.5');
                listItem.setAttribute('color', item.id === currentSelectedId ? "#FFFFFF" : item.color);
                vrList.appendChild(listItem);
            });
        }

        window.onload = renderScene;
    </script>
</body>
</html>
