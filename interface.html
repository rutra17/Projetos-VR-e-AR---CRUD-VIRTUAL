<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      #ui { position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div id="ui">
      <h3>CRUD 3D - Inventário</h3>
      <input type="text" id="itemName" placeholder="Nome do objeto">
      <button onclick="handleCreate()">Adicionar (POST)</button>
      <p><small>Clique no objeto para Deletar ou Atualizar</small></p>
    </div>

    <a-scene>
      <a-sky color="#ECECEC"></a-sky>
      <a-entity id="itemContainer" position="0 0 -5"></a-entity>
      
      <a-camera>
        <a-cursor color="#FF0000"></a-cursor>
      </a-camera>
    </a-scene>

    <script src="app.js"></script>
  </body>
</html>
